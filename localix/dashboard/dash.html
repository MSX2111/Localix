<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <title>Localix</title>
    <link rel="stylesheet" href="./dash.css" />
  </head>
  <body>
    <nav>
      <div class="head">
        <a href="../index.html" class="logo">
          <img src="../localix (4).png" alt="localix logo" width="200" />
        </a>
        <div class="pic">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="ident">
          <h3>Lumora</h3>
          <p>Perfumes Brand</p>
        </div>
      </div>
      <ul>
        <li>
          <div class="theme-switch">
            <label class="switch">
              <input type="checkbox" id="themeToggle" />
              <span class="slider"></span>
            </label>
            <span class="theme-label">Dark Mode</span>
          </div>
        </li>
        <li class="search"><a href="../search/search.html">Search</a></li>
        <li class="signOut"><a href="../index.html">Sign Out</a></li>
      </ul>
    </nav>
    <section class="dashboard-tabs">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="insights">Insights</button>
        <button class="tab-btn" data-tab="products">Products</button>
        <button class="tab-btn" data-tab="posts">Posts</button>
      </div>
      <div class="tab-content active" id="insights">
        <div class="insight-cards">
          <div class="insight-card">
            <i class="fa-solid fa-box"></i>
            <div>
              <h3>Total Products</h3>
              <p>4</p>
            </div>
          </div>
          <div class="insight-card">
            <i class="fa-solid fa-dollar-sign"></i>
            <div>
              <h3>Catalog Value</h3>
              <p>$2,400</p>
            </div>
          </div>
          <div class="insight-card">
            <i class="fa-solid fa-star"></i>
            <div>
              <h3>Best Selling Product</h3>
              <p>Luxury Perfume</p>
            </div>
          </div>
        </div>
      </div>
      <div class="tab-content" id="products">
        <button class="add-product-btn" id="openAddProductModal">
          <i class="fa-solid fa-plus"></i> Add Product
        </button>
        <div class="products-list"></div>
      </div>
      <div class="tab-content" id="posts">
        <button class="add-post-btn" id="openAddPostModal">
          <i class="fa-solid fa-plus"></i> Add Post
        </button>
        <div class="posts-list"></div>
      </div>
    </section>
    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Add Product</h2>
        <form id="addProductForm">
          <input
            type="text"
            id="productName"
            placeholder="Product Name"
            required
          />
          <input
            type="number"
            id="productPrice"
            placeholder="Price"
            required
            min="0"
            step="0.01"
          />
          <input
            type="text"
            id="productImage"
            placeholder="Image URL"
            required
          />
          <button type="submit"><i class="fa-solid fa-plus"></i> Add</button>
        </form>
      </div>
    </div>
    <!-- Add Post Modal -->
    <div id="addPostModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close post-close">&times;</span>
        <h2>Add Post</h2>
        <form id="addPostForm">
          <input type="text" id="postTitle" placeholder="Post Title" required />
          <textarea
            id="postContent"
            placeholder="Post Content"
            required
            rows="4"
            style="
              resize: vertical;
              padding: 10px;
              border-radius: 6px;
              border: 1px solid #ccc;
              font-size: 1em;
            "
          ></textarea>
          <input type="url" id="postImage" placeholder="Image URL (optional)" />
          <img
            id="postImagePreview"
            class="post-image-preview"
            alt="Post Image Preview"
          />
          <button type="submit"><i class="fa-solid fa-plus"></i> Add</button>
        </form>
      </div>
    </div>
    <script src="dash.js"></script>
  </body>
</html>
